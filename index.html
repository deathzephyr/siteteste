<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Saga de Berk | Como Treinar o Seu Dragão</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
        :root {
            --deep-ocean: #060d16;
            --dragon-fire: #ff6b35;
            --dragon-gold: #ffb347;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-heading: 'Cinzel', serif;
            --font-body: 'Kalam', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--deep-ocean);
            color: #f4e8d0;
            line-height: 1.6;
        }

        /* --- Navbar --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-img { height: 50px; filter: drop-shadow(0 0 5px var(--dragon-fire)); }

        .music-player {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--dragon-fire);
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- Layout --- */
        .content-wrapper { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, rgba(6,13,22,0.5), var(--deep-ocean)), url('https://images5.alphacoders.com/935/935943.jpg') center/cover;
            margin-bottom: 40px;
            border-radius: 0 0 50px 50px;
        }

        .hero h1 { font-family: var(--font-heading); font-size: 3.5rem; margin-bottom: 10px; color: white; }

        /* --- Cards e Grid --- */
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .movie-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--dragon-fire); }
        .movie-card img { width: 100%; height: 400px; object-fit: cover; }
        .movie-card-content { padding: 20px; }

        /* --- Abas e Episódios --- */
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .tab-button {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-heading);
        }
        .tab-button.active { background: var(--dragon-fire); border-color: var(--dragon-fire); }

        .episode-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--dragon-fire);
        }

        /* --- Botões --- */
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-watch, .btn-download {
            flex: 1;
            padding: 12px;
            text-decoration: none;
            color: white;
            text-align: center;
            border-radius: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-watch { background: #2ecc71; }
        .btn-download { background: #3498db; }

        /* --- Modal --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--dragon-fire);
            width: 90%; max-width: 400px;
            text-align: center;
        }
        .modal-options a {
            display: block;
            background: var(--glass);
            color: white;
            padding: 15px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }
        .modal-options a:hover { background: var(--dragon-fire); }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="music-player" id="musicBtn">
            <i class="fas fa-play" id="musicIcon"></i>
            <span>Test Drive.mp3</span>
            <audio id="bgMusic" src="Test Drive.mp3" loop></audio>
        </div>
    </nav>

    <header class="hero">
        <h1>Reino dos Dragões</h1>
        <p>A maior saga de Berk em um só lugar.</p>
    </header>

    <main class="content-wrapper">
        <section class="movies-grid">
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/ij8M6X1S4hNq0BscF8B1w6hS8yM.jpg" alt="Filme 1">
                <div class="movie-card-content">
                    <h3>Filme 1</h3>
                    <div class="action-buttons">
                        <button class="btn-watch open-modal" data-title="Assitir Filme 1" data-links='{"drive":"#","stream":"#"}'>Assistir</button>
                    </div>
                </div>
            </div>
            </section>

        <section style="margin-top: 50px;">
            <h2 style="font-family: var(--font-heading); margin-bottom: 20px;">Séries</h2>
            <div class="tab-buttons" id="tabButtons">
                <button class="tab-button active" onclick="loadEpisodes(1)">Temporada 1</button>
                <button class="tab-button" onclick="loadEpisodes(2)">Temporada 2</button>
            </div>
            <div id="episodeList"></div>
        </section>
    </main>

    <div id="optionsModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Opções</h3>
            <div id="modalOptions" class="modal-options"></div>
            <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:gray; cursor:pointer;">Fechar</button>
        </div>
    </div>

    <script>
        // --- Lógica de Música ---
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        
        musicBtn.onclick = () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicIcon.className = 'fas fa-pause';
            } else {
                bgMusic.pause();
                musicIcon.className = 'fas fa-play';
            }
        };

        // --- Dados dos Episódios ---
        const seriesData = {
            1: [
                { id: 1, title: "O Olho do Dragão", links: {drive: "link1", stream: "link2"} },
                { id: 2, title: "Cura de Dragão", links: {drive: "link3", stream: "link4"} }
            ],
            2: [
                { id: 1, title: "Noite dos Caçadores", links: {drive: "link5", stream: "link6"} }
            ]
        };

        function loadEpisodes(season) {
            const container = document.getElementById('episodeList');
            container.innerHTML = '';
            
            // Atualizar botões ativos
            document.querySelectorAll('.tab-button').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === season);
            });

            seriesData[season].forEach(ep => {
                const div = document.createElement('div');
                div.className = 'episode-item';
                div.innerHTML = `
                    <span>Episódio ${ep.id}: ${ep.title}</span>
                    <button class="btn-watch" onclick="openModal('Assistir ${ep.title}', ${JSON.stringify(ep.links)})" style="width:auto; padding:8px 15px">Assistir</button>
                `;
                container.appendChild(div);
            });
        }

        // --- Lógica do Modal ---
        function openModal(title, links) {
            document.getElementById('modalTitle').innerText = title;
            const container = document.getElementById('modalOptions');
            container.innerHTML = `
                <a href="${links.drive}" target="_blank"><i class="fab fa-google-drive"></i> Google Drive</a>
                <a href="${links.stream}" target="_blank"><i class="fas fa-play"></i> StreamHG</a>
            `;
            document.getElementById('optionsModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('optionsModal').style.display = 'none';
        }

        // Inicializar
        loadEpisodes(1);

        // Fechar modal ao clicar fora
        window.onclick = (event) => {
            if (event.target.className === 'modal') closeModal();
        };
    </script>
</body>
</html>
